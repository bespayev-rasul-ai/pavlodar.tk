<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта ТК ССР Павлодар</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px; /* Для удобства на мобильных */
            max-width: 400px;
            z-index: 1000;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        input#search-input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #007bff;
            border-radius: 8px;
            font-size: 16px; /* Чтобы iPhone не увеличивал масштаб при вводе */
            outline: none;
        }
        #results {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 8px;
            display: none;
            background: white;
            border-radius: 8px;
        }
        .result-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item:active { background: #e9ecef; }
        .result-item b { color: #007bff; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск ТК (напр. 97 или тк97)..." autocomplete="off">
        <div id="results"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([52.287, 76.967], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ CSV
        const tableUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnWaUNZ-F1bZZ3CdDQ5Ejushcn2RlsJ2aYVO6gu1j6FVD1Ha1kYWcSqp1TPdldtvRPmd114CkgjXBC/pub?output=csv'; 

        let allMarkers = [];

        // Функция нормализации: всё в нижний регистр, латиницу в кириллицу, убираем лишнее
        function normalize(text) {
            if (!text) return "";
            return text.toString()
                .toLowerCase()
                .replace(/t/g, 'т') // англ t -> рус т
                .replace(/k/g, 'к') // англ k -> рус к
                .replace(/[^а-яё0-9]/g, ''); // оставляем только русские буквы и цифры
        }

        function loadMarkers() {
            Papa.parse(tableUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        // Проверяем разные варианты написания заголовков
                        const name = row.name || row.Name || row['Имя'] || "";
                        const lat = parseFloat(row.lat || row.Lat || row['Широта']);
                        const lng = parseFloat(row.lng || row.Lng || row['Долгота']);
                        const desc = row.description || row.Description || row['Описание'] || "";

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(`<b>ТК: ${name}</b><br>${desc}`);
                            
                            allMarkers.push({
                                searchName: normalize(name), // "Чистое" имя для поиска
                                originalName: name,
                                marker: marker
                            });
                        }
                    });
                }
            });
        }

        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const val = normalize(e.target.value);
            resultsContainer.innerHTML = '';
            
            if (val.length < 1) {
                resultsContainer.style.display = 'none';
                return;
            }

            // Ищем совпадение
            const filtered = allMarkers.filter(m => m.searchName.includes(val));
            
            if (filtered.length > 0) {
                resultsContainer.style.display = 'block';
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `Найдено: <b>${item.originalName}</b>`;
                    div.onclick = () => {
                        map.setView(item.marker.getLatLng(), 18);
                        item.marker.openPopup();
                        resultsContainer.style.display = 'none';
                        searchInput.value = item.originalName;
                    };
                    resultsContainer.appendChild(div);
                });
            } else {
                resultsContainer.style.display = 'none';
            }
        });

        loadMarkers();
    </script>
</body>
</html>
