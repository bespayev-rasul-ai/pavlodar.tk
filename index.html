<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта ТК ССР Павлодар</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* КРАСИВЫЙ ПОИСК */
        .search-box {
            position: absolute; top: 15px; left: 15px; right: 15px;
            z-index: 1000; background: white; padding: 6px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 380px;
        }
        input {
            width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0;
            border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box;
            background: #f9f9f9; transition: 0.3s;
        }
        input:focus { border-color: #007bff; background: #fff; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        
        #results {
            background: white; max-height: 250px; overflow-y: auto;
            border-radius: 10px; display: none; margin-top: 8px;
        }
        .item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; }
        .item:last-child { border-bottom: none; }
        .item:active { background: #f0f7ff; }

        /* ЭСТЕТИЧНЫЙ ПЕРЕКЛЮЧАТЕЛЬ СЛОЕВ */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
            padding: 5px !important;
        }
        /* Увеличиваем иконку для мобилок */
        .leaflet-control-layers-toggle {
            width: 44px !important;
            height: 44px !important;
            background-size: 26px 26px !important;
        }
        .leaflet-control-layers-expanded {
            padding: 10px 15px !important;
            color: #333;
            font-size: 14px;
            line-height: 1.8;
        }
        /* Красивые радиокнопки */
        .leaflet-control-layers-selector { margin-right: 8px; margin-top: 2px; }

        /* Кнопка "Где я" - если захочешь добавить позже */
        .gps-button {
            position: absolute; bottom: 25px; right: 15px; z-index: 1000;
            background: white; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="search" placeholder="Поиск ТК (напр. 97)..." autocomplete="off">
    <div id="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Настройка слоев
    const dgis = L.tileLayer('https://tile{s}.maps.2gis.com/tiles?z={z}&x={x}&y={y}&v=1', {
        subdomains: '0123', attribution: '© 2GIS'
    });
    const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        subdomains: ['mt0','mt1','mt2','mt3'], attribution: '© Google'
    });
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });

    const map = L.map('map', {
        center: [52.287, 76.967],
        zoom: 14,
        layers: [dgis],
        zoomControl: false // Скрываем стандартные кнопки +-, чтобы не мешали
    });

    // Добавляем кнопки зума в удобное место (снизу справа)
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // МЕНЮ СЛОЕВ (с настройкой отображения)
    const baseMaps = {
        "<span style='font-weight:bold;'>🗺️ 2ГИС Карта</span>": dgis,
        "<span style='font-weight:bold;'>🛰️ Спутник Google</span>": googleSat,
        "<span style='font-weight:bold;'>🏁 Схема OSM</span>": osm
    };
    
    // collapsed: true делает его иконкой на мобильных (так эстетичнее)
    L.control.layers(baseMaps, null, { collapsed: true, position: 'topright' }).addTo(map);

    const tableUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnWaUNZ-F1bZZ3CdDQ5Ejushcn2RlsJ2aYVO6gu1j6FVD1Ha1kYWcSqp1TPdldtvRPmd114CkgjXBC/pub?output=csv'; 
    let markersData = [];

    function clean(text) {
        if (!text) return "";
        return text.toString().toLowerCase().replace(/t/g, 'т').replace(/k/g, 'к').replace(/[^а-яё0-9]/g, '');
    }

    function loadData() {
        Papa.parse(tableUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    const name = row.name || row.Name || "";
                    const lat = parseFloat(row.lat || row.Lat);
                    const lng = parseFloat(row.lng || row.Lng);
                    const desc = row.description || row.Description || "";

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const m = L.marker([lat, lng]).addTo(map);
                        m.bindPopup(`<div style="font-size:14px;"><b>ТК: ${name}</b><br>${desc}</div>`);
                        
                        markersData.push({ cleanName: clean(name), realName: name, marker: m });
                    }
                });
            }
        });
    }

    const input = document.getElementById('search');
    const resDiv = document.getElementById('results');

    input.addEventListener('input', () => {
        const query = clean(input.value);
        resDiv.innerHTML = '';
        if (query.length < 1) { resDiv.style.display = 'none'; return; }
        const found = markersData.filter(x => x.cleanName.includes(query));
        if (found.length > 0) {
            resDiv.style.display = 'block';
            found.forEach(x => {
                const d = document.createElement('div');
                d.className = 'item';
                d.innerHTML = `📍 <b>${x.realName}</b>`;
                d.onclick = () => {
                    map.setView(x.marker.getLatLng(), 18);
                    x.marker.openPopup();
                    resDiv.style.display = 'none';
                    input.value = x.realName;
                };
                resDiv.appendChild(d);
            });
        } else { resDiv.style.display = 'none'; }
    });

    // Геолокация
    map.locate({setView: false, watch: true});
    map.on('locationfound', (e) => {
        if (window.userMarker) { window.userMarker.setLatLng(e.latlng); } 
        else { window.userMarker = L.circleMarker(e.latlng, {radius: 6, color: '#007bff', fillColor: '#007bff', fillOpacity: 1}).addTo(map); }
    });

    loadData();
</script>
</body>
</html>
