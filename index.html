<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта ТК Павлодар</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .search-container {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 280px;
        }
        input#search-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #007bff;
            border-radius: 4px;
            outline: none;
        }
        #results {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 5px;
            display: none;
            background: white;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        .result-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .result-item:hover { background: #e9ecef; }
        .result-item b { color: #007bff; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Введите номер ТК (напр. 97)...">
        <div id="results"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // 1. Инициализация карты
        const map = L.map('map').setView([52.287, 76.967], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Ссылка на CSV (убедитесь, что она в кавычках!)
        const tableUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnWaUNZ-F1bZZ3CdDQ5Ejushcn2RlsJ2aYVO6gu1j6FVD1Ha1kYWcSqp1TPdldtvRPmd114CkgjXBC/pub?output=csv'; 

        let allMarkers = [];

        function loadMarkers() {
            Papa.parse(tableUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("Данные успешно считаны:", results.data);
                    
                    results.data.forEach(row => {
                        // Используем маленькие буквы, как показала ваша консоль
                        const name = row.name || "Без названия";
                        const lat = parseFloat(row.lat);
                        const lng = parseFloat(row.lng);
                        const desc = row.description || "";

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(`<b>ТК: ${name}</b><br>${desc}`);
                            
                            allMarkers.push({
                                searchName: name.toString().toLowerCase(),
                                originalName: name,
                                marker: marker
                            });
                        }
                    });
                }
            });
        }

        // 3. Логика поиска
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            resultsContainer.innerHTML = '';
            
            if (val.length < 1) {
                resultsContainer.style.display = 'none';
                return;
            }

            const filtered = allMarkers.filter(m => m.searchName.includes(val));
            
            if (filtered.length > 0) {
                resultsContainer.style.display = 'block';
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `Найдено: <b>${item.originalName}</b>`;
                    div.onclick = () => {
                        map.setView(item.marker.getLatLng(), 18); // Крупный план
                        item.marker.openPopup();
                        resultsContainer.style.display = 'none';
                        searchInput.value = item.originalName;
                    };
                    resultsContainer.appendChild(div);
                });
            } else {
                resultsContainer.style.display = 'none';
            }
        });

        loadMarkers();
    </script>
</body>
</html>
